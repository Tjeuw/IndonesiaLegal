<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indonesia Law AI — Early Access</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="admin-login-page">
  <div class="admin-login-box">
    <div class="welcome-icon">⚖</div>
    <h2>Early Access</h2>
    <p>Indonesia Law AI is currently in private beta. Enter your access password to continue.</p>
    <div class="admin-login-form">
      <input type="password" id="gate-password" class="admin-input" placeholder="Enter access password" autofocus>
      <button class="admin-login-btn" id="gate-login-btn">Access Demo</button>
      <p class="admin-error" id="gate-error" style="display:none">Incorrect password. Please contact the team for access.</p>
    </div>
  </div>
</div>
<script>
  async function tryLogin() {
    const pw = document.getElementById('gate-password').value;
    const err = document.getElementById('gate-error');
    const btn = document.getElementById('gate-login-btn');
    err.style.display = 'none';
    btn.textContent = 'Checking...';
    btn.disabled = true;
    try {
      const res = await fetch('/demo/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({password: pw})
      });
      if (res.ok) {
        window.location.href = '/';
      } else {
        err.style.display = 'block';
      }
    } catch(e) {
      err.textContent = 'Connection error. Please try again.';
      err.style.display = 'block';
    }
    btn.textContent = 'Access Demo';
    btn.disabled = false;
  }
  document.getElementById('gate-login-btn').addEventListener('click', tryLogin);
  document.getElementById('gate-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryLogin();
  });
</script>
</body>
</html>
