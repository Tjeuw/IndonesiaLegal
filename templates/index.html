<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indonesia Law AI</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span>Indonesia Law AI</span>
      </div>
      <div class="sidebar-actions">
        <button class="icon-btn" id="new-chat-btn" title="New Chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="lang-bar">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="zh">中文</button>
      <button class="lang-btn" data-lang="id">ID</button>
    </div>

    <div class="conversations-list" id="conversations-list"></div>

    <div class="sidebar-footer">
      <button class="theme-btn" id="theme-toggle-btn">
        <svg id="theme-icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg id="theme-icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <span id="theme-label">Dark Mode</span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <!-- Top bar -->
    <header class="topbar">
      <button class="icon-btn sidebar-toggle" id="sidebar-toggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="topbar-title" id="chat-title">Indonesia Law AI</span>
      <div style="width:32px"></div>
    </header>

    <!-- Messages area -->
    <div class="messages-container" id="messages-container">
      <!-- Welcome screen -->
      <div class="welcome-screen" id="welcome-screen">
        <div class="welcome-inner">
          <div class="welcome-icon">⚖</div>
          <h1 class="welcome-title" id="welcome-title">Indonesia Law AI</h1>
          <p class="welcome-subtitle" id="welcome-subtitle">Your legal research assistant for Indonesian business, investment, and corporate law.</p>
          <div class="chips" id="chips-container">
            <button class="chip" id="chip1">Setting Up a PT PMA</button>
            <button class="chip" id="chip2">Foreign Investment Restrictions</button>
            <button class="chip" id="chip3">Employment Law</button>
          </div>
        </div>
      </div>

      <!-- Messages -->
      <div class="messages" id="messages" style="display:none"></div>
    </div>

    <!-- Input area -->
    <div class="input-area" id="chat-input-area">
      <div class="attached-files-bar" id="attached-files-bar"></div>
      <div class="upload-progress" id="upload-inline-progress" style="display:none">
        <div class="upload-progress-bar">
          <div class="upload-progress-fill" id="upload-inline-fill"></div>
        </div>
        <span class="upload-progress-text" id="upload-inline-text">Processing...</span>
      </div>
      <form class="input-form" id="message-form">
        <button type="button" class="attach-btn" id="attach-btn" title="Attach document">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <textarea class="message-input" id="message-input" placeholder="Ask your legal question about Indonesia..." rows="1"></textarea>
        <button type="submit" class="send-btn" id="send-btn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </form>
      <input type="file" id="chat-file-input" style="display:none" accept=".pdf,.txt,.md" multiple>
      <p class="input-disclaimer">AI-generated legal information. Always verify with a licensed Indonesian attorney.</p>
    </div>
  </main>
</div>

<div class="sidebar-overlay" id="sidebar-overlay"></div>
<script src="/static/app.js"></script>
</body>
</html>
